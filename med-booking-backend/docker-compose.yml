version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: medicapp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_segreta
      POSTGRES_DB: medicapp_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: