<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Nuova Prenotazione</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  
  <!-- SELEZIONE VISITA -->
  <div *ngIf="step === 1">
    <h3>1. Seleziona il tipo di visita</h3>
    <ion-list lines="inset" class="ion-margin-top">
      <ion-item button *ngFor="let p of listaPrestazioni" (click)="selezionaPrestazione(p)">
        <ion-icon slot="start" name="medical-outline" color="primary"></ion-icon>
        <ion-label>{{ p.nome }}</ion-label>
        <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
      </ion-item>
    </ion-list>
  </div>

  <!-- SELEZIONE DATA -->
  <div *ngIf="step === 2">
    <div class="ion-display-flex ion-align-items-center">
      <ion-button fill="clear" (click)="indietro(1)">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
      <h3>2. Scegli il giorno</h3>
    </div>
    
    <ion-card>
      <ion-card-content class="ion-no-padding">
        <!-- Calendario per scegliere il giorno -->
        <ion-datetime 
          presentation="date" 
          [min]="dataMinima" 
          (ionChange)="selezionaData($event)">
        </ion-datetime>
      </ion-card-content>
    </ion-card>
  </div>

  <!-- SELEZIONE DOTTORE E ORARIO -->
  <div *ngIf="step === 3">
    <div class="ion-display-flex ion-align-items-center">
      <ion-button fill="clear" (click)="indietro(2)">
        <ion-icon slot="icon-only" name="arrow-back-outline"></ion-icon>
      </ion-button>
      <h3>3. Dottori e Orari disponibili</h3>
    </div>

    <p class="ion-padding-horizontal">Data scelta: <b>{{ dataSelezionata | date:'dd/MM/yyyy' }}</b></p>

    <div *ngIf="mediciFiltrati.length === 0" class="ion-padding text-center">
      <p>Nessun medico disponibile per questa prestazione nel giorno selezionato.</p>
    </div>

    <ion-card *ngFor="let medico of mediciFiltrati">
      <ion-card-header>
        <ion-card-title>{{ medico.nome }}</ion-card-title>
        <ion-card-subtitle>Orari disponibili:</ion-card-subtitle>
      </ion-card-header>
      <ion-card-content>
        <div class="orari-container">
          <ion-button 
            size="small" 
            fill="outline" 
            *ngFor="let ora of medico.orari" 
            (click)="confermaPrenotazione(medico, ora)">
            {{ ora }}
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>
  </div>

</ion-content>
